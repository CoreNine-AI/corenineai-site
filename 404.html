<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>페이지를 찾을 수 없습니다 — CoreNine AI</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif;color:#0D1B2A;
  min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;
  background:
    radial-gradient(900px 500px at 88% -10%,rgba(10,184,221,.16) 0%,transparent 60%),
    radial-gradient(600px 380px at -6% 110%,rgba(155,231,216,.14) 0%,transparent 55%),
    linear-gradient(180deg,#F0FAF5 0%,#FFFFFF 100%);
  word-break:keep-all}
.wrap{padding:48px 24px;max-width:560px}
.sym{width:88px;height:54px;margin:0 auto 26px}
.code{font-size:15px;font-weight:800;letter-spacing:4px;color:#0ab8dd;margin-bottom:14px}
h1{font-size:30px;font-weight:800;letter-spacing:-.5px;line-height:1.4;margin-bottom:14px}
p{font-size:16px;color:#4a5568;line-height:1.7;margin-bottom:32px}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
a.btn{display:inline-block;padding:14px 28px;border-radius:12px;font-size:15px;font-weight:700;text-decoration:none;transition:.2s}
a.primary{background:linear-gradient(135deg,#0ab8dd,#0ab8dd);color:#fff;box-shadow:0 8px 20px rgba(10,184,221,.25)}
a.primary:hover{transform:translateY(-2px)}
a.ghost{border:1.5px solid #d5dbe6;color:#0D1B2A;background:#fff}
a.ghost:hover{border-color:#0ab8dd;color:#0891b0}
</style>
</head>
<body>
<div class="wrap">
  <svg class="sym" viewBox="0 0 103 63" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><rect x="0" y="0" width="11" height="11" rx="2" fill="#111111"/><rect x="13" y="0" width="11" height="11" rx="2" fill="#111111"/><rect x="26" y="0" width="11" height="11" rx="2" fill="#111111"/><rect x="0" y="13" width="11" height="11" rx="2" fill="#111111"/><rect x="0" y="26" width="11" height="11" rx="2" fill="#111111"/><rect x="0" y="39" width="11" height="11" rx="2" fill="#111111"/><rect x="0" y="52" width="11" height="11" rx="2" fill="#111111"/><rect x="13" y="52" width="11" height="11" rx="2" fill="#111111"/><rect x="26" y="52" width="11" height="11" rx="2" fill="#111111"/><rect x="52" y="0" width="11" height="11" rx="2" fill="#0ab8dd"/><rect x="65" y="0" width="11" height="11" rx="2" fill="#0ab8dd"/><rect x="78" y="0" width="11" height="11" rx="2" fill="#0ab8dd"/><rect x="91" y="0" width="11" height="11" rx="2" fill="#0ab8dd"/><rect x="52" y="13" width="11" height="11" rx="2" fill="#0ab8dd"/><rect x="91" y="13" width="11" height="11" rx="2" fill="#0ab8dd"/><rect x="52" y="26" width="11" height="11" rx="2" fill="#0ab8dd"/><rect x="65" y="26" width="11" height="11" rx="2" fill="#0ab8dd"/><rect x="78" y="26" width="11" height="11" rx="2" fill="#0ab8dd"/><rect x="91" y="26" width="11" height="11" rx="2" fill="#0ab8dd"/><rect x="91" y="39" width="11" height="11" rx="2" fill="#0ab8dd"/><rect x="91" y="52" width="11" height="11" rx="2" fill="#0ab8dd"/></svg>
  <div class="code">404 NOT FOUND</div>
  <h1>찾으시는 페이지가 없습니다</h1>
  <p>주소가 바뀌었거나 삭제된 페이지입니다.<br>아래 버튼으로 이동해 주세요.</p>
  <div class="btns">
    <a class="btn primary" href="/">홈으로 가기</a>
    <a class="btn ghost" href="/contact.html">상담 문의</a>
  </div>
</div>
</body>
</html>
